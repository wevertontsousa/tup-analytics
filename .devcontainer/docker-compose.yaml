networks:
  tup_analytics:
    name: tup_analytics

volumes:
  tup_analytics:
    name: tup_analytics_data

services:
  db:
    container_name: tup_analytics_db
    image: postgres:16.1-alpine3.19
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - tup_analytics:/var/lib/postgresql/data
    networks:
      - tup_analytics
    ports:
      - 5432:5432

  worker_ssr:
    container_name: tup_analytics_worker_ssr
    build:
      context: .
      dockerfile: Dockerfile
    image: tup_analytics_worker_ssr
    environment:
      - SSH_AUTH_SOCK=${SOCKET_FOLDER}
      - TXT_FOLDER=${TXT_FOLDER}
      - DB_URL=${DB_URL}
    volumes:
      - ${SOCKET_FOLDER}:${SSH_AUTH_SOCK}:ro
      - ${GIT_CONFIG}:${HOME}/.gitconfig:ro
      - ..:/workspace
    networks:
      - tup_analytics
    command: sleep infinity
